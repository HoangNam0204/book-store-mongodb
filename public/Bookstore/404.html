<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không tìm thấy trang - BookStore</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .notfound-page {
            width: min(820px, calc(100% - 40px));
            margin: 48px auto;
        }

        .notfound-card {
            background: #fff;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .notfound-code {
            font-size: 84px;
            font-weight: 800;
            color: #8b0000;
            line-height: 1;
            margin-bottom: 14px;
        }

        .notfound-card p {
            color: #555;
            line-height: 1.7;
        }

        .notfound-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .notfound-actions button {
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            color: #fff;
            background: #8b0000;
            cursor: pointer;
            font-weight: 700;
        }

        .notfound-actions button:last-child {
            background: #6d8263;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1><a href="Trang_chu.html">Book Store</a></h1>
        </div>
        <nav>
            <ul>
                <li><a href="Trang_chu.html">Trang chủ</a></li>
                <li><a href="Danh_sach_san_pham.html">Sản phẩm</a></li>
                <li><a href="Khuyen_mai.html">Khuyến mãi</a></li>
                <li><a href="Lien_he.html">Liên hệ</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <button id="loginBtn"><a href="Dang_nhap.html">Đăng nhập</a></button>
            |
            <button id="signupBtn"><a href="Dang_ki.html">Đăng ký</a></button>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Tìm kiếm sách, tác giả...">
            <button type="button">Tìm kiếm</button>
        </div>
        <div class="gio-hang">
            <button type="button" onclick="toggleCartDropdown()">Giỏ hàng <span class="arrow-down">▼</span></button>
            <div class="cart-dropdown">
                <ul class="cart-items">
                    <li class="cart-item">
                        <div class="cart-item-details">
                            <span class="cart-item-name">Đang tải giỏ hàng...</span>
                        </div>
                    </li>
                </ul>
                <div class="cart-actions">
                    <button onclick="window.location.href='Gio_hang.html'">Xem giỏ hàng</button>
                    <button onclick="window.location.href='Thanh_toan.html'">Thanh toán</button>
                </div>
            </div>
        </div>
    </header>

    <main class="notfound-page">
        <section class="notfound-card">
            <div class="notfound-code">404</div>
            <h2>Không tìm thấy trang bạn yêu cầu</h2>
            <p>Đường dẫn này không còn tồn tại hoặc đã được thay đổi. Bạn có thể quay về trang chủ hoặc tiếp tục khám phá danh sách sản phẩm của BookStore.</p>
            <div class="notfound-actions">
                <button type="button" onclick="window.location.href='Trang_chu.html'">Về trang chủ</button>
                <button type="button" onclick="window.location.href='Danh_sach_san_pham.html'">Xem sản phẩm</button>
            </div>
        </section>
    </main>

    <script src="js/store.js"></script>
    <script src="js/Trang_chu.js?v=20260326-cartview5"></script>
</body>
</html>
